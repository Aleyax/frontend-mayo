<div class="mk-shell">
  <header class="mk-topbar">
    <a class="brand" routerLink="/marketplace">B2B Marketplace</a>
    <div class="mk-actions">
      <nav>
        <a routerLink="/marketplace" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Catalogo</a>
        <a routerLink="/marketplace/cart" routerLinkActive="active-link">Carrito</a>
        <a routerLink="/marketplace/track-order" routerLinkActive="active-link">Seguimiento</a>
      </nav>
      <button
        type="button"
        class="theme-toggle"
        [attr.aria-label]="currentTheme === 'dark' ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
        [attr.title]="currentTheme === 'dark' ? 'Tema oscuro' : 'Tema claro'"
        (click)="toggleTheme()"
      >
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb">{{ currentTheme === 'dark' ? 'Oscuro' : 'Claro' }}</span>
        </span>
      </button>
    </div>
  </header>
  <main class="mk-content">
    <router-outlet></router-outlet>
  </main>
</div>
